services:
  db:
    image: postgres:16
    container_name: brotou-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: senha123
      POSTGRES_DB: brotoudb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: ./brotou-api
      dockerfile: Dockerfile
    container_name: brotou-api
    depends_on:
      - db
    env_file:
      - ./brotou-api/.env
    environment:
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-5173}
      JWT_ADMIN_SECRET: ${JWT_ADMIN_SECRET:-admin_secret_local_docker}
      JWT_ADMIN_EXPIRES_IN: ${JWT_ADMIN_EXPIRES_IN:-1d}
    ports:
      - "${API_PORT:-3333}:3333"
    restart: unless-stopped

  frontend:
    build:
      context: ./brotou-frontend
      dockerfile: Dockerfile
    container_name: brotou-frontend
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-3333}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    restart: unless-stopped

volumes:
  postgres_data:
